name: Make CMake (macOS)
run-name: Make CMake ${{ inputs.cmake_version }}
on:
  workflow_dispatch:
    inputs:
      cmake_version:
        description: "CMake Version"
        required: true
        default: "4.1.2"
      ninja_version:
        description: "Ninja Version"
        required: true
        default: "1.12.1"

permissions:
  contents: write
  packages: read

jobs:
  make:
    uses: ./.github/workflows/make-cmake.yml
    secrets: inherit
    with:
      platform: macos
      cmake_version: ${{ inputs.cmake_version }}
      ninja_version: ${{ inputs.ninja_version }}
      targets: >-
        ["x86_64-apple-darwin", "x86_64h-apple-darwin",
         "arm64-apple-darwin", "arm64e-apple-darwin"]
