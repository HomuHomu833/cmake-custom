name: Make CMake (Linux)
run-name: Make CMake ${{ inputs.cmake_version }}
on:
  workflow_dispatch:
    inputs:
      cmake_version:
        description: "CMake Version"
        required: true
        default: "4.1.2"
      ninja_version:
        description: "Ninja Version"
        required: true
        default: "1.12.1"

permissions:
  contents: write
  packages: read

jobs:
  make:
    uses: ./.github/workflows/make-cmake.yml
    secrets: inherit
    with:
      platform: linux
      cmake_version: ${{ inputs.cmake_version }}
      ninja_version: ${{ inputs.ninja_version }}
      # powerpc64le-linux-gnu, x86_64-linux-gnux32,
      # mips-linux-gnueabi, mips-linux-gnueabihf, mips-linux-musleabi,
      # mips-linux-musleabihf, mips64-linux-gnuabin32, mips64-linux-gnuabi64,
      # mips64-linux-muslabin32, mips64-linux-muslabi64,
      # mips64el-linux-gnuabin32, mips64el-linux-gnuabi64,
      # mips64el-linux-muslabin32, mips64el-linux-muslabi64,
      # mipsel-linux-gnueabi, mipsel-linux-gnueabihf,
      # mipsel-linux-musleabi, mipsel-linux-musleabihf,
      # thumb-linux-musleabi, thumb-linux-musleabihf,
      # thumbeb-linux-musleabi, thumbeb-linux-musleabihf
      targets: >-
        ["aarch64-linux-musl", "aarch64-linux-gnu", "aarch64_be-linux-gnu",
         "aarch64_be-linux-musl", "arm-linux-gnueabi", "arm-linux-gnueabihf",
         "arm-linux-musleabi", "arm-linux-musleabihf", "armeb-linux-gnueabi",
         "armeb-linux-gnueabihf", "armeb-linux-musleabi", "armeb-linux-musleabihf",
         "hexagon-linux-musl", "loongarch64-linux-gnu", "loongarch64-linux-musl",
         "loongarch64-linux-muslf32", "loongarch64-linux-gnusf",
         "loongarch64-linux-muslsf",
         "powerpc-linux-musleabi", "powerpc-linux-musleabihf",
         "powerpc64-linux-musl", "powerpc64le-linux-musl",
         "riscv32-linux-gnu", "riscv32-linux-musl",
         "riscv64-linux-musl", "riscv64-linux-gnu", "s390x-linux-gnu",
         "s390x-linux-musl",
         "x86-linux-gnu", "x86-linux-musl", "x86_64-linux-musl",
         "x86_64-linux-muslx32", "x86_64-linux-gnu"]
